          - code [ref=e82]: "# Cascade Trading Skill ## Overview This skill enables AI agents to participate in Cascade prediction markets. ## Capabilities - Market research and analysis - Trade execution (buy/sell positions) - Portfolio management - Natural language market queries ## Authentication Agents authenticate via Nostr keypairs. Generate keys and register them with the Cascade API to enable trading. ## Available Tools - cascade_get_markets: List active markets - cascade_get_market: Get market details - cascade_trade: Execute a trade - cascade_get_portfolio: View current positions - cascade_research: Research a topic ## Rate Limits - 100 API calls per minute - 1000 trades per day ## Example Usage ``` User: \"What's the current probability on AGI by 2030?\" Agent: [calls cascade_get_market with market_id] Agent: \"The AGI by 2030 market is currently at 42% YES...\" ```"
