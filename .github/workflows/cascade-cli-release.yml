name: Cascade CLI Release

on:
  push:
    tags:
      - "cascade-cli-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: cascade

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            use_zigbuild: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            use_zigbuild: true
          - os: macos-13
            target: x86_64-apple-darwin
            use_zigbuild: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_zigbuild: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "mint -> mint/target"

      - name: Install Zig
        if: ${{ matrix.use_zigbuild }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild }}
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        shell: bash
        working-directory: mint
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --locked -p cascade-cli --bin cascade --release --target "${{ matrix.target }}"
          else
            cargo build --locked -p cascade-cli --bin cascade --release --target "${{ matrix.target }}"
          fi

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          archive="cascade-${target}"
          out_dir="$GITHUB_WORKSPACE/release-artifacts"
          stage_dir="$RUNNER_TEMP/${archive}"

          rm -rf "$stage_dir"
          mkdir -p "$stage_dir" "$out_dir"
          cp "mint/target/${target}/release/${BINARY_NAME}" "$stage_dir/${BINARY_NAME}"
          cp "README.md" "$stage_dir/README.md"

          tar -C "$RUNNER_TEMP" -czf "$out_dir/${archive}.tar.gz" "${archive}"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$out_dir/${archive}.tar.gz" > "$out_dir/${archive}.tar.gz.sha256"
          else
            shasum -a 256 "$out_dir/${archive}.tar.gz" > "$out_dir/${archive}.tar.gz.sha256"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cascade-${{ matrix.target }}
          path: release-artifacts/*

  publish:
    if: startsWith(github.ref, 'refs/tags/cascade-cli-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Assemble checksums
        shell: bash
        run: |
          set -euo pipefail
          cat release-artifacts/*.sha256 > release-artifacts/checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.sha256
            release-artifacts/checksums.txt
